@if (weather) {
  <div
    class="weather-banner d-flex flex-wrap align-items-center justify-content-between gap-3"
    [ngClass]="getWeatherClass(weather.condition)"
  >
    <!-- Left: icon + temperature + condition pill -->
    <div class="d-flex align-items-center gap-3 weather-left">
      <img
        [src]="weather.iconUrl"
        [alt]="weather.condition + ' weather icon'"
        class="weather-icon"
        (error)="$any($event.target).style.display='none'"
        width="54" height="54"
      />
      <div>
        <!-- Temperature display -->
        <div class="d-flex align-items-baseline gap-1 weather-temp-row">
          <span class="temp-max">{{ weather.tempMax }}°C</span>
          <span class="temp-sep">/</span>
          <span class="temp-min">{{ weather.tempMin }}°C</span>
        </div>
        <span class="weather-pill mt-1">{{ weather.condition }}</span>
      </div>
    </div>

    <!-- Right: AI tip box -->
    <div class="weather-tip-box">
      <i class="fa-solid fa-lightbulb tip-bulb-icon"></i>
      <p class="tip-text mb-0">{{ weather.aiTip }}</p>
    </div>
  </div>
} @else {
  <div class="weather-banner weather-default d-flex flex-wrap align-items-center justify-content-between gap-3 loading-banner">
    <div class="d-flex align-items-center gap-3 weather-left w-100">
      <div class="weather-icon skeleton-circle skeleton-pulse"></div>
      <div class="flex-grow-1">
        <div class="skeleton-line skeleton-medium skeleton-pulse mb-2"></div>
        <div class="skeleton-line skeleton-short skeleton-pulse"></div>
      </div>
    </div>
    <div class="weather-tip-box w-100 skeleton-pulse mt-2" style="height: 60px;"></div>
  </div>
}
