<div class="map-wrapper">
  <div #mapContainer id="itinerary-map" class="map-container"></div>

  <!-- Top Left Overlay Badge -->
  <div class="map-overlay-badge">
    <span class="pulse-dot"></span>
    <span class="badge-text">Day {{ dayNumber }} — {{ (activities || []).length }} Stops</span>
  </div>

  <!-- Top Right Custom Zoom Controls -->
  <div class="map-zoom-controls">
    <button type="button" class="zoom-btn" (click)="zoomIn()" title="Zoom In">
      <i class="fa-solid fa-plus"></i>
    </button>
    <button type="button" class="zoom-btn" (click)="zoomOut()" title="Zoom Out">
      <i class="fa-solid fa-minus"></i>
    </button>
  </div>

  <!-- Bottom Centered Horizontal Legend -->
  <div class="map-legend">
    <div class="legend-item"><span class="dot dot-food"></span> Food</div>
    <div class="legend-item"><span class="dot dot-attraction"></span> Attraction</div>
    <div class="legend-item"><span class="dot dot-leisure"></span> Leisure</div>
    <div class="legend-item"><span class="dot dot-hotel"></span> Hotel</div>
  </div>
</div>
