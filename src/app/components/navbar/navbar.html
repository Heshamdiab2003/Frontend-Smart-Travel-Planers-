<nav class="navbar navbar-expand-lg wandr-nav fixed-top" [class.scrolled]="isScrolled || lightBg">
  <div class="container-fluid px-3 px-lg-4">

    <!-- LEFT: Brand Logo -->
    <a class="navbar-brand wandr-logo me-0" routerLink="/">TripMind</a>

    <!-- Mobile Toggler -->
    <button
      class="navbar-toggler border-0 shadow-none d-lg-none"
      type="button"
      (click)="isMenuOpen = !isMenuOpen"
      [attr.aria-expanded]="isMenuOpen"
      aria-controls="navbarNav"
      aria-label="Toggle navigation"
    >
      <span class="toggler-bar"></span>
      <span class="toggler-bar"></span>
      <span class="toggler-bar"></span>
    </button>

    <!-- CENTER + RIGHT: Collapsible Content -->
    <div class="collapse navbar-collapse" [class.show]="isMenuOpen" id="navbarNav">

      <!-- CENTER: Navigation Links -->
      <ul class="navbar-nav mx-auto gap-1 gap-lg-3 align-items-lg-center py-3 py-lg-0">
        <li class="nav-item">
          <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/plan" routerLinkActive="active">Plan Your Trip</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/chat" routerLinkActive="active">AI Chat</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/my-trips" routerLinkActive="active">My Trips</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/about" routerLinkActive="active">About Us</a>
        </li>
      </ul>

      <!-- RIGHT: Auth Section -->
      <div class="d-flex align-items-center gap-2 pb-3 pb-lg-0">
        @if (!authService.isLoggedIn()) {
          <a routerLink="/signup" class="btn-signup">Sign Up</a>
        }

        @if (authService.isLoggedIn()) {
          <div class="user-menu">
            <button class="user-icon-btn" (click)="toggleDropdown()" aria-label="User menu">
              <i class="fa fa-user-circle"></i>
            </button>
            @if (isDropdownOpen) {
              <div class="user-dropdown open">
                <a routerLink="/portfolio" class="dropdown-item">
                  <i class="fa fa-user"></i> My Profile
                </a>
                <a routerLink="/my-trips" class="dropdown-item">
                  <i class="fa fa-suitcase"></i> My Trips
                </a>
                <a routerLink="/settings" class="dropdown-item">
                  <i class="fa fa-cog"></i> Settings
                </a>
                <div class="dropdown-divider my-1"></div>
                <button (click)="logout()" class="dropdown-item text-danger border-0 bg-transparent w-100 text-start d-flex align-items-center gap-2">
                  <i class="fa-solid fa-right-from-bracket"></i> Sign Out
                </button>
              </div>
            }
          </div>
        }
      </div>

    </div>
  </div>
</nav>
