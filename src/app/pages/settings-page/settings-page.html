<app-navbar [lightBg]="true"></app-navbar>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      
      <!-- Feedback Alerts -->
      @if (successMessage) {
        <div class="alert alert-success alert-toast d-flex align-items-center rounded-4 shadow-sm mb-4 border-0 p-3" role="alert">
          <i class="fa-solid fa-circle-check me-2 fs-5 text-success"></i>
          <div class="fw-semibold text-success">{{ successMessage }}</div>
        </div>
      }
      @if (errorMessage) {
        <div class="alert alert-danger alert-toast d-flex align-items-center rounded-4 shadow-sm mb-4 border-0 p-3" role="alert">
          <i class="fa-solid fa-triangle-exclamation me-2 fs-5 text-danger"></i>
          <div class="fw-semibold text-danger">{{ errorMessage }}</div>
        </div>
      }

      <!-- Settings Card -->
      <div class="card shadow-sm border-0 rounded-4 p-4 p-md-5 bg-white">
        <app-settings (triggerAlert)="onAlert($event)"></app-settings>
      </div>

    </div>
  </div>
</div>
